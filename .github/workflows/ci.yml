name: CI

"on":
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install host dependencies
        run: python -m pip install -r requirements.txt
      - name: Validate frozen benchmark corpus
        run: python scripts/validate_bench_tasks.py benchmarks/quant-terminal-v1.toml
      - name: Run regression suite
        run: python -m unittest discover -s tests -p "test_*.py"
