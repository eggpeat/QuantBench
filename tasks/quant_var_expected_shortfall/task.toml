[provenance]
source_books = ["source_books/MASTERING R FOR QUANTITATIVE FINANCE.pdf"]
source_concepts = ["portfolio returns", "historical VaR", "expected shortfall/CVaR"]
source_depth = "moderate"
source_citations = [
  "Mastering R for Quantitative Finance, read-extracted lines 9995-10001: defines 95% VaR from the lower fifth percentile; lines 10035-10055: describes historical simulation and shows VaR from sampled historical returns; lines 10080-10095: defines Expected Shortfall as tail expectation beyond VaR, notes CVaR terminology, and states ES treatment goes beyond the book's scope while referring to Acerbi and Tasche (2002).",
  "Carlo Acerbi and Dirk Tasche (2002), 'Expected Shortfall for Coherent Risk Measures' (also arXiv:cond-mat/0104295), which defines Expected Shortfall mathematically to ensure coherence."
]
source_gaps = [
  "Expected Shortfall (ES) calculation details are outside the scope of the cited Mastering R book, which refers to Acerbi & Tasche (2002).",
  "This task explicitly implements a discrete historical ES approximation, defined as the average of all losses greater than or equal to the calculated VaR threshold (losses >= VaR nearest-rank threshold). This is an intentional finite-sample contract for the verifier, rather than a continuous or interpolated tail-distribution expectation."
]
