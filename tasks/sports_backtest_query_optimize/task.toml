task_design_note = "Promoted Quant Bench task for SQLite backtest database query optimization. The query joins three tables with a date range filter and correlated subqueries. Without indexes, SQLite performs full table scans and creates automatic temporary indexes, which is highly inefficient. The task tests the agent's ability to analyze the query, design covering/composite indexes, and verify that the SQLite optimizer transitions from SCAN to SEARCH without any automatic indexes."

