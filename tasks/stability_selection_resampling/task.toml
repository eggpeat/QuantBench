  "kmedved/sift oracle commit 07d774d (stability-selection source basis), https://github.com/kmedved/sift/commit/07d774d"
]

[provenance]
source_books = []
source_concepts = ["stability selection", "subsampled feature selection", "weighted Pearson correlation", "group/time dependent resampling"]
source_depth = "moderate"
source_citations = [
  "kmedved/sift, commit 07d774d (2025-12-28), public SIFT feature-selection work that motivates deterministic resampling integration; https://github.com/kmedved/sift/commit/07d774d",
  "Meinshausen, N. and Buehlmann, P. (2010), Stability selection, Journal of the Royal Statistical Society: Series B 72(4), 417-473, doi:10.1111/j.1467-9868.2010.00740.x: defines selection frequencies under randomized subsampling and thresholded stable sets.",
  "Kish, L. (1965), Survey Sampling, Wiley, Chapter 2: motivates sampling units/whole groups rather than independently splitting clustered observations."
]
source_gaps = [
  "The cited stability-selection paper does not prescribe median imputation or standardization; this task explicitly requires both to be fit independently within each resample to prevent preprocessing leakage.",
  "The task extends iid subsampling to whole-group and contiguous-time blocks and fixes a reproducible seed stream whose result is independent of n_jobs."
]
promotion_blockers = []
task_design_note = "Seeded-100 public workspace plus hidden fixtures test local median/scaling, weighted Pearson scores, deterministic lower-index ties, whole-group and contiguous-time sampling, mutual-exclusion validation, and n_jobs parity."

