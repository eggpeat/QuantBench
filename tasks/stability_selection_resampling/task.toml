description = "Implement deterministic stability selection with local per-resample preprocessing, weighted Pearson scoring, and group/time resampling."
requires_image = false
keywords = ["stability-selection", "resampling", "weighted-correlation", "missing-data", "time-series", "parallelism"]

[metadata]
difficulty = "hard"
